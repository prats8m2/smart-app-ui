<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div
        class="page-title-box d-flex align-items-center justify-content-between"
      >
        <h4 class="mb-0 font-size-18">Account</h4>
        <div class="page-title-right">
          <div class="col-md-12 d-flex justify-content-end">
            <input
              type="button"
              class="btn btn-success mt-3 mt-lg-0 ml-auto"
              value="Add Account"
              (click)="routeToAddUser()"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card user-table-card">
          <div class="card-body">
            <h4 class="card-title">List of account(s)</h4>

            <div class="table-responsive user-table">
              <table class="table mb-0">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngIf="usersList.length == 0">
                    <p class="card-title-desc">
                      Use contextual classes to color table rows or individual
                      cells.
                    </p>
                  </tr>
                  <tr *ngFor="let user of usersList; let i = index">
                    <th scope="row">{{ i + 1 }}</th>
                    <td (click)="viewUser(user.id)" class="show-cursor">
                      {{ user.firstName }}
                    </td>
                    <td>{{ user.lastName }}</td>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>
                      <div ngbDropdown placement="bottom-left">
                        <i
                          class="mdi mdi-dots-vertical dropdown-toggle show-cursor"
                          ngbDropdownToggle
                          data-toggle="dropdown"
                          aria-expanded="true"
                        ></i>
                        <div
                          class="dropdown-menu dropdown-menu-end"
                          ngbDropdownMenu
                        >
                          <a
                            class="dropdown-item"
                            href="javascript: void(0);"
                            (click)="editUser(user.id)"
                            ><i class="mdi mdi-account-edit"></i> Edit</a
                          >

                          <a
                            class="dropdown-item"
                            href="javascript: void(0);"
                            (click)="deleteUser(user.id)"
                            ><i class="mdi mdi-delete"></i> Delete</a
                          >
                        </div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
