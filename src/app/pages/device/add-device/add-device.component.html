<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div
        class="page-title-box d-flex align-items-center justify-content-between"
      >
        <h4 class="mb-0 font-size-18" *ngIf="!isEditScreen">Add New Device</h4>
        <h4 class="mb-0 font-size-18" *ngIf="isEditScreen">Update Device</h4>
      </div>
    </div>
  </div>
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-body">
            <form
              class="needs-validation"
              (ngSubmit)="validSubmit()"
              [formGroup]="deviceForm"
            >
              <div class="row">
                <div class="col-md-6" *ngIf="!isEditScreen">
                  <div class="mb-3">
                    <label for="account">Account</label>
                    <select
                      class="form-control form-select"
                      id="account"
                      formControlName="account"
                      placeholder="Account Name"
                      [attr.disabled]="isEditScreen ? true : null"
                      (change)="changeAccountList($event.target.value)"
                    >
                      <option
                        *ngFor="let account of accountList"
                        [value]="account.id"
                      >
                        {{ account.name }}
                      </option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="site">Site</label>
                    <select
                      class="form-control form-select"
                      id="site"
                      formControlName="site"
                      placeholder="Site"
                      [attr.disabled]="isEditScreen ? true : null"
                      (change)="changeSiteList($event.target.value)"
                    >
                      <option *ngIf="siteList?.length == 0" disabled>
                        Select an Account
                      </option>
                      <option *ngFor="let site of siteList" [value]="site.id">
                        {{ site.name }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="code">Code</label>
                    <input
                      type="text"
                      class="form-control"
                      id="code"
                      formControlName="code"
                      placeholder="Code"
                    />
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="room">Room</label>
                    <select
                      class="form-control form-select"
                      id="roomId"
                      formControlName="roomId"
                      placeholder="Room"
                    >
                      <option *ngFor="let room of roomList" [value]="room.id">
                        {{ room.name }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="d-flex flex-wrap gap-2">
                <button
                  type="reset"
                  class="btn btn-secondary waves-effect"
                  (click)="onReset()"
                  [disabled]="deviceForm.pristine"
                >
                  Reset
                </button>
                <button
                  *ngIf="!isEditScreen"
                  type="submit"
                  class="btn btn-primary waves-effect waves-light"
                  (click)="onSave()"
                  [disabled]="deviceForm.invalid || deviceForm.pristine"
                >
                  Save
                </button>
                <button
                  *ngIf="isEditScreen"
                  type="submit"
                  class="btn btn-primary waves-effect waves-light"
                  (click)="onUpdate()"
                  [disabled]="deviceForm.invalid || deviceForm.pristine"
                >
                  Update
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
