<div class="container-fluid">
  <!-- start page title -->
  <div class="row">
    <div class="col-12">
      <div
        class="page-title-box d-flex align-items-center justify-content-between"
      >
        <h4 class="mb-0 font-size-18" *ngIf="!isEditScreen">Add New Role</h4>
        <h4 class="mb-0 font-size-18" *ngIf="isEditScreen">Update Role</h4>
      </div>
    </div>
  </div>
  <!-- end page title -->

  <!--Add Role FORM-->

  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-body">
            <form
              class="needs-validation"
              (ngSubmit)="validSubmit()"
              [formGroup]="roleForm"
            >
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="roleName">Role Name</label>
                    <input
                      type="text"
                      class="form-control"
                      id="roleName"
                      formControlName="roleName"
                      placeholder="Role name"
                    />
                  </div>
                </div>
              </div>

              <div class="d-flex flex-wrap gap-2">
                <button
                  type="reset"
                  class="btn btn-secondary waves-effect"
                  (click)="onReset()"
                  [disabled]="roleForm.pristine"
                >
                  Reset
                </button>
                <button
                  *ngIf="!isEditScreen"
                  type="submit"
                  class="btn btn-primary waves-effect waves-light"
                  (click)="onSave()"
                  [disabled]="roleForm.invalid || roleForm.pristine"
                >
                  Save
                </button>
                <button
                  *ngIf="isEditScreen"
                  type="submit"
                  class="btn btn-primary waves-effect waves-light"
                  (click)="onUpdate()"
                  [disabled]="roleForm.invalid || roleForm.pristine"
                >
                  Update
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
