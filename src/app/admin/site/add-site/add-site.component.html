<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div
        class="page-title-box d-flex align-items-center justify-content-between"
      >
        <h4 class="mb-0 font-size-18" *ngIf="!isEditScreen">Add New Site</h4>
        <h4 class="mb-0 font-size-18" *ngIf="isEditScreen">Update Site</h4>
      </div>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-body">
            <form
              class="needs-validation"
              (ngSubmit)="validSubmit()"
              [formGroup]="siteForm"
            >
              <div class="row">
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="siteName">Site</label>
                    <input
                      type="text"
                      class="form-control"
                      id="siteName"
                      formControlName="siteName"
                      placeholder="Site name"
                      [ngClass]="{
                        'is-valid': submit && form.siteName.errors
                      }"
                    />
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="siteType">Type</label>
                    <select
                      class="form-control"
                      id="siteType"
                      formControlName="type"
                      placeholder="Site Type"
                      [attr.disabled]="isEditScreen ? true : null"
                    >
                      <option *ngFor="let site of siteTypes" [value]="site.id">
                        {{ site.label }}
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6" *ngIf="userRole == 'super-admin'">
                  <div class="mb-3">
                    <label for="account">Account</label>
                    <select
                      class="form-control form-select"
                      id="account"
                      formControlName="account"
                      placeholder="Account Name"
                      [attr.disabled]="isEditScreen ? true : null"
                    >
                      <option
                        *ngFor="let account of accountList"
                        [value]="account.id"
                      >
                        {{ account.name }}
                      </option>
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="mb-3">
                    <label for="address">Address</label>
                    <input
                      type="text"
                      class="form-control"
                      id="address"
                      formControlName="address"
                      placeholder="Address"
                      [ngClass]="{
                        'is-valid': submit && form.address.errors
                      }"
                    />
                    <div
                      *ngIf="submit && form.address.errors"
                      class="valid-feedback"
                    >
                      <span *ngIf="form.address.errors.required"
                        >Looks good!</span
                      >
                    </div>
                  </div>
                </div>
              </div>

              <div class="row">
                <div class="col-md-12">
                  <div class="mb-3">
                    <div class="card-body">
                      <h4 class="card-title mb-4">Wifi Details</h4>
                      <form class="repeater" [formGroup]="siteForm">
                        <div formArrayName="wifiDetails">
                          <div
                            *ngFor="
                              let data1 of formData.controls;
                              let i = index
                            "
                          >
                            <div [formGroupName]="i" class="row">
                              <div class="mb-3 col-lg-5">
                                <label for="username">Username</label>
                                <input
                                  type="text"
                                  formControlName="username"
                                  placeholder="Username"
                                  class="form-control"
                                />
                              </div>

                              <div class="mb-3 col-lg-5">
                                <label for="password">Password</label>
                                <input
                                  type="password"
                                  formControlName="password"
                                  class="form-control"
                                  placeholder="Password"
                                />
                              </div>

                              <div class="col-lg-2 mt-1 align-self-center">
                                <div class="d-grid">
                                  <input
                                    type="button"
                                    class="btn btn-primary"
                                    value="Delete"
                                    (click)="removeField(i)"
                                  />
                                </div>
                              </div>
                            </div>
                          </div>
                          <div class="col-md-12 d-flex justify-content-end">
                            <input
                              type="button"
                              class="btn btn-success mt-3 mt-lg-0 ml-auto"
                              value="Add"
                              (click)="addField()"
                            />
                          </div>
                        </div>
                      </form>
                    </div>
                  </div>
                </div>
              </div>

              <div class="d-flex flex-wrap gap-2">
                <button
                  type="reset"
                  class="btn btn-secondary waves-effect"
                  (click)="onReset()"
                  [disabled]="siteForm.pristine"
                >
                  Reset
                </button>
                <button
                  *ngIf="!isEditScreen"
                  type="submit"
                  class="btn btn-primary waves-effect waves-light"
                  (click)="onSave()"
                  [disabled]="siteForm.invalid || siteForm.pristine"
                >
                  Save
                </button>
                <button
                  *ngIf="isEditScreen"
                  type="submit"
                  class="btn btn-primary waves-effect waves-light"
                  (click)="onUpdate()"
                  [disabled]="siteForm.invalid || siteForm.pristine"
                >
                  Update
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
