<div class="container-fluid">
  <div class="row">
    <div class="col-12">
      <div
        class="page-title-box d-flex align-items-center justify-content-between"
      >
        <h4 class="mb-0 font-size-18">Rooms</h4>
        <div class="page-title-right">
          <div class="text-sm-end">
            <button
              type="button"
              class="btn btn-primary btn-rounded mb-2 me-2"
              (click)="routeToAddRoom()"
            >
              <i class="mdi mdi-plus mr-1"></i> Add Room
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card user-table-card">
          <div class="card-body">
            <div class="row">
              <div class="col-md-2">
                <h4 class="card-title">List of Room(s)</h4>
              </div>
              <div class="col-md-10">
                <div class="row justify-content-end">
                  <div
                    class="col-md-3 page-title-right"
                    *ngIf="userRole === 'super-admin'"
                  >
                    <div class="col-md-4 mt-2">
                      <label for="account">Account</label>
                    </div>
                    <div class="col-md-8 mb-3">
                      <select
                        class="form-control form-select"
                        id="account"
                        placeholder="Account"
                        (change)="changeAccountValue($event.target.value)"
                      >
                        <option
                          *ngFor="let account of accountList"
                          [value]="account.id"
                        >
                          {{ account.name }}
                        </option>
                      </select>
                    </div>
                  </div>
                  <div class="col-md-3 page-title-right">
                    <div class="col-md-4 mt-2">
                      <label for="site">Site</label>
                    </div>
                    <div class="col-md-8 mb-3">
                      <select
                        class="form-control form-select"
                        id="site"
                        placeholder="Site"
                        (change)="changeSiteValue($event.target.value)"
                      >
                        <option *ngFor="let site of siteList" [value]="site.id">
                          {{ site.name }}
                        </option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="table-responsive user-table">
              <table class="table mb-0">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Occupied</th>
                    <th>Device Code</th>
                    <th>Action</th>
                  </tr>
                </thead>
                <tbody>
                  <tr *ngFor="let room of roomList; let i = index">
                    <th scope="row">{{ i + 1 }}</th>
                    <td (click)="viewRoom(room.id)" class="show-cursor">
                      {{ room.name }}
                    </td>
                    <td>
                      {{
                        room.occupied == 0
                          ? "No"
                          : room.occupied == 1
                          ? "Yes"
                          : "N/A"
                      }}
                    </td>
                    <td>{{ room.device.code }}</td>
                    <td>
                      <div ngbDropdown placement="bottom-left">
                        <i
                          class="mdi mdi-dots-vertical dropdown-toggle show-cursor"
                          ngbDropdownToggle
                          data-toggle="dropdown"
                          aria-expanded="true"
                        ></i>
                        <div
                          class="dropdown-menu dropdown-menu-end"
                          ngbDropdownMenu
                        >
                          <a
                            class="dropdown-item"
                            href="javascript: void(0);"
                            (click)="editRoom(room.id)"
                            ><i class="mdi mdi-account-edit"></i> Edit</a
                          >

                          <a
                            class="dropdown-item"
                            href="javascript: void(0);"
                            (click)="deleteRoom(room.id)"
                            ><i class="mdi mdi-delete"></i> Delete</a
                          >
                        </div>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
